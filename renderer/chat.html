<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小伴 · 聊天</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f5f2ee;height:100vh;display:flex;flex-direction:column;user-select:none}
.header{background:#d46a78;color:#fff;padding:10px 14px;font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center;-webkit-app-region:drag}
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.5;max-width:85%;word-break:break-word}
.msg.user{align-self:flex-end;background:#d46a78;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#e8e4df;color:#333;border-bottom-left-radius:4px}
.msg.loading{opacity:0.5}
.input-area{display:flex;gap:8px;padding:10px;border-top:1px solid#e0dcd6;background:#fff}
.input-area input{flex:1;padding:8px 12px;border:1px solid#d0ccc6;border-radius:18px;font-size:13px;outline:none}
.input-area input:focus{border-color:#d46a78}
.input-area button{padding:8px 16px;background:#d46a78;color:#fff;border:none;border-radius:18px;font-size:13px;cursor:pointer}
.input-area button:disabled{opacity:0.5}
</style>
</head>
<body>
<div class="header"><span>♥ 小伴 · 聊天</span></div>
<div class="messages" id="messages"><div class="msg assistant">你好呀~ 有什么想和我聊的吗？</div></div>
<div class="input-area">
  <input id="input" placeholder="输入消息..." autofocus>
  <button id="sendBtn">发送</button>
</div>
<script>
const api = window.electronAPI;
const $ = id => document.getElementById(id);

let config={baseURL:'https://api.openai.com/v1',model:'gpt-4o-mini',apiKey:'',temperature:0.8,maxTokens:200};
let profile={name:'小伴',appearance:'温柔知性',personality:'细腻会关心人'};
let history=[];

async function init(){
  const c=await api.getConfig('agentConfig'), p=await api.getConfig('petProfile');
  if(c)Object.assign(config,c); if(p)Object.assign(profile,p);
}
init();

function addMsg(role,content){
  const d=document.createElement('div'); d.className='msg '+role; d.textContent=content;
  $('messages').appendChild(d); $('messages').scrollTop=$('messages').scrollHeight;
}

async function send(){
  const text=$('input').value.trim(); if(!text)return;
  $('input').value=''; addMsg('user',text); history.push({role:'user',content:text});
  const ld=document.createElement('div'); ld.className='msg assistant loading'; ld.textContent='...';
  $('messages').appendChild(ld);
  try{
    const resp=await api.chatCompletion({message:text,history:history.slice(0,-1),config,profile});
    ld.remove(); const reply=resp?.text||'嗯...'; addMsg('assistant',reply);
    history.push({role:'assistant',content:reply});
  }catch(e){ld.remove();addMsg('assistant','出错了，再试一次？');}
}
$('sendBtn').onclick=send; $('input').onkeydown=e=>{if(e.key==='Enter')send();};
</script>
</body>
</html>
