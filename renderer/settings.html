<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小伴 · 设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f5f2ee;height:100vh;display:flex;flex-direction:column;user-select:none;overflow:hidden}
.tabs{display:flex;background:#d46a78;color:#fff;font-size:12px;-webkit-app-region:drag}
.tab{padding:8px 14px;cursor:pointer;opacity:0.65;border-bottom:2px solid transparent;-webkit-app-region:no-drag}
.tab.active{opacity:1;border-bottom-color:#fff;font-weight:600}
.tab:hover{opacity:0.9}
.panel{flex:1;overflow-y:auto;display:none;padding:12px}
.panel.active{display:block}
.section{margin-bottom:16px}
.section h3{font-size:13px;color:#666;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid#e0dcd6}
label{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;font-size:12px;color:#555}
label input,label select,label textarea{padding:6px 8px;border:1px solid#d0ccc6;border-radius:6px;font-size:12px;outline:none}
label input:focus,label select:focus,label textarea:focus{border-color:#d46a78}
label textarea{resize:vertical;min-height:40px}
button{font-size:12px;padding:6px 12px;border:none;border-radius:6px;cursor:pointer}
.btn-primary{background:#d46a78;color:#fff}.btn-secondary{background:#e0dcd6;color:#333}.btn-danger{background:#c44;color:#fff}.btn-sm{padding:3px 8px;font-size:11px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.slider-row{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.slider-row>span{display:flex;justify-content:space-between;font-size:11px}
.slider-row small{color:#d46a78;font-weight:600}
.slider-wrap{display:flex;align-items:center;gap:4px}
.slider-wrap input[type=range]{flex:1}
.slider-low,.slider-high{font-size:10px;color:#aaa;min-width:28px}
.slider-low{text-align:right}.slider-high{text-align:left}
.memory-item{display:flex;justify-content:space-between;align-items:start;padding:8px;background:#fff;border-radius:8px;margin-bottom:4px;gap:8px}
.memory-item .keys{font-size:10px;color:#d46a78;margin-bottom:2px}
.memory-item .content{font-size:12px;color:#333}
.memory-item .actions{display:flex;gap:4px;flex-shrink:0}
.var-bar{margin-bottom:8px}
.var-bar .label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.var-bar .track{height:6px;background:#e0dcd6;border-radius:3px;overflow:hidden}
.var-bar .fill{height:100%;border-radius:3px;transition:width 0.5s}
.var-history{font-size:11px;color:#888;max-height:200px;overflow-y:auto}
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" data-panel="companion">💕 伴侣</div>
  <div class="tab" data-panel="variables">📊 变量</div>
  <div class="tab" data-panel="llm">🔌 LLM</div>
</div>

<!-- 伴侣 -->
<div class="panel" id="panel-variables">
  <div class="section"><h3>关系变量</h3><div id="varBars"></div></div>
  <div class="section"><h3>变动记录</h3><div class="var-history" id="varHistory"></div></div>
</div>

<!-- LLM -->
<div class="panel" id="panel-llm">
  <div class="section">
    <h3>AI 后端</h3>
    <label>提供商<select id="llmProvider">
      <option value="openai">OpenAI 兼容</option>
      <option value="ollama">Ollama 本地</option>
      <option value="anthropic">Anthropic Claude</option>
      <option value="deepseek">DeepSeek</option>
    </select></label>
    <label>Base URL<input id="baseURL" placeholder="https://api.openai.com/v1"></label>
    <label>模型<input id="model" placeholder="gpt-4o-mini"></label>
    <label>API Key<input id="apiKey" type="password" placeholder="留空则本地模式"></label>
    <label>Temperature<input id="temperature" type="range" min="0" max="2" step="0.1" value="0.8"><small id="tempVal">0.8</small></label>
  </div>
  <div class="section">
    <h3>情绪引擎</h3>
    <label>思考间隔（秒）<input id="thinkInterval" type="number" min="5" max="120" value="15"></label>
  </div>
</div>

<!-- 伴侣 -->
<div class="panel" id="panel-companion">
  <div class="section">
    <h3>伴侣列表</h3>
    <p style="font-size:11px;color:#888;margin-bottom:8px">一次只能激活一个伴侣。切换伴侣会同步更新人格配置、配色和记忆。</p>
    <div id="companionList"></div>
    <div class="row" style="margin-top:8px">
      <button class="btn-primary" id="btnNewCompanion">+ 新建伴侣</button>
      <button class="btn-secondary" id="btnImportCard">导入角色卡</button>
      <input type="file" id="fileImport" accept=".json" style="display:none">
    </div>
    <p style="font-size:10px;color:#aaa;margin-top:4px">点击「编辑」在独立窗口中修改所有属性和人格</p>
  </div>
  </div>
</div>

<script>
const api = window.electronAPI;
const $ = id => document.getElementById(id);

// Tab
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$('panel-'+t.dataset.panel).classList.add('active');
};});

// ===== 变量 =====
let variables={affection:50,trust:50,familiarity:30,energy:70,mood:60},varHistory=[];
const varColors={affection:'#e87080',trust:'#5b9bd5',familiarity:'#6ba58b',energy:'#e8a050',mood:'#a080d0'};
const varNames={affection:'好感度',trust:'信任度',familiarity:'熟悉度',energy:'精力',mood:'心情'};
async function loadVars(){const s=await api.getConfig('variables');if(s?.values)Object.assign(variables,s.values);if(s?.history)varHistory=s.history.slice(-50);renderVars();}
function renderVars(){
  $('varBars').innerHTML=Object.entries(variables).map(([k,v])=>`<div class="var-bar"><div class="label"><span>${varNames[k]||k}</span><span>${v}/100</span></div><div class="track"><div class="fill" style="width:${v}%;background:${varColors[k]||'#888'}"></div></div></div>`).join('');
  $('varHistory').innerHTML=varHistory.slice(-30).reverse().map(h=>{const d=new Date(h.time);return`<div>${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} ${varNames[h.var]||h.var} ${h.delta>0?'+'+h.delta:h.delta} ${h.reason||''}</div>`;}).join('');
}
loadVars();

// ===== LLM =====
let config={baseURL:'https://api.openai.com/v1',model:'gpt-4o-mini',apiKey:'',temperature:0.8,maxTokens:200,provider:'openai'};
let thinkInterval=15;
async function loadLLM(){const c=await api.getConfig('agentConfig');if(c)Object.assign(config,c);$('baseURL').value=config.baseURL||'';$('model').value=config.model||'';$('apiKey').value=config.apiKey||'';$('llmProvider').value=config.provider||'openai';$('temperature').value=config.temperature||0.8;$('tempVal').textContent=config.temperature||0.8;const ti=await api.getConfig('thinkInterval');if(ti)thinkInterval=ti;$('thinkInterval').value=thinkInterval;}
function saveLLM(){config.baseURL=$('baseURL').value;config.model=$('model').value;config.apiKey=$('apiKey').value;config.provider=$('llmProvider').value;config.temperature=parseFloat($('temperature').value);api.setConfig('agentConfig',config);}
$('llmProvider').onchange=function(){
  const v=this.value;
  if(v==='ollama'){$('baseURL').value='http://localhost:11434/v1';$('model').value='llama3.2';}
  else if(v==='anthropic'){$('baseURL').value='https://api.anthropic.com/v1';$('model').value='claude-sonnet-4-20250514';}
  else if(v==='deepseek'){$('baseURL').value='https://api.deepseek.com/v1';$('model').value='deepseek-chat';}
  else{$('baseURL').value='https://api.openai.com/v1';$('model').value='gpt-4o-mini';}
  saveLLM();
};
['baseURL','model','apiKey'].forEach(id=>$(id).addEventListener('change',saveLLM));
$('temperature').oninput=function(){$('tempVal').textContent=this.value;saveLLM();};
$('thinkInterval').onchange=function(){thinkInterval=parseInt(this.value)||15;api.setConfig('thinkInterval',thinkInterval);};
loadLLM();

// ===== 伴侣管理 =====
let companions=[],activeId=null,editingId=null;

async function loadCompanions(){
  const s=await api.getConfig('characterState');
  if(s){if(s.companions)companions=s.companions;if(s.activeId)activeId=s.activeId;}
  if(companions.length===0){
    const id=Date.now().toString(36);
    companions.push({id,name:'小伴',archetype:'温柔人妻型',personality:{core:'温柔、细腻、会主动关心人',traits:{extraversion:45,sensitivity:70,clinginess:50,energy:50,expressiveness:65,sophistication:70,sapiosexuality:55,tolerance:75,romanticism:45,equanimity:60,attachment:45,possessiveness:55,libido:50,dominance:20,demandingness:40,maternity:75},speaking_style:''},appearance:{style:'针织衫+长裙'},palette:{dress:'#7eb8a6',dressDark:'#5a9a86',skirt:'#6aaa96',skirtDark:'#4d8a75',accent:'#e8c86e',shoe:'#4a3a30',sole:'#2a1a10'}});
    activeId=id;
    await api.setConfig('characterState',{companions,activeId});
  }
  if(!activeId)activeId=companions[0].id;
  renderCompanionList();
}
async function saveCompanions(){await api.setConfig('characterState',{companions,activeId});}

function renderCompanionList(){
  $('companionList').innerHTML=companions.map(c=>{
    const isActive=c.id===activeId;
    return `<div class="memory-item" style="border-left:3px solid ${isActive?'#d46a78':'#e0dcd6'}">
      <div><div style="font-size:13px;font-weight:600">${c.name} ${isActive?'<span style="color:#d46a78;font-size:11px">● 已激活</span>':''}</div>
      <div style="font-size:11px;color:#888">${c.archetype||''} ${c.personality?.core?.slice(0,20)||''}...</div></div>
      <div class="actions">
        ${!isActive?`<button class="btn-primary btn-sm activate-btn" data-id="${c.id}">激活</button>`:''}
        <button class="btn-secondary btn-sm edit-btn" data-id="${c.id}">编辑</button>
      </div></div>`;
  }).join('');
  document.querySelectorAll('.activate-btn').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.id;
    activeId=id;
    // 通知主窗口切换伴侣
    const c=companions.find(x=>x.id===id);
    if(c){
      api.setConfig('characterState',{companions,activeId});
      // 更新人格
      if(c.personality?.traits){api.setConfig('personality',{dimensions:c.personality.traits,name:c.name});}
      // 通知 renderer 刷新
      api.send('companion-changed',{id,name:c.name,palette:c.palette||{}});
    }
    renderCompanionList();
  });
  document.querySelectorAll('.edit-btn').forEach(b=>b.onclick=()=>editCompanion(b.dataset.id));
}

function editCompanion(id){
  const c=companions.find(x=>x.id===id);
  if(!c)return;
  api.openCompanionEditor(c);
}

$('btnNewCompanion').onclick=()=>{
  api.openCompanionEditor({id:Date.now().toString(36),name:'新伴侣',personality:{core:'',traits:{},speaking_style:''},appearance:{},palette:{}});
};

// 接收编辑器保存的数据
api.onCompanionSaved?.((data)=>{
  if(!data)return;
  const idx=companions.findIndex(c=>c.id===data.id);
  if(idx>=0){
    companions[idx]={...companions[idx],...data};
  }else{
    companions.push(data);
  }
  saveCompanions();
  if(data.id===activeId){
    api.setConfig('personality',{dimensions:data.personality?.traits||{},name:data.name});
    api.send('companion-changed',{id:data.id,name:data.name,palette:data.palette,spritesheet:data.spritesheet});
  }
  renderCompanionList();
});

$('btnImportCard').onclick=()=>$('fileImport').click();
$('fileImport').onchange=async function(){
  const file=this.files[0];if(!file)return;
  const text=await file.text();
  try{
    const card=JSON.parse(text);
    api.openCompanionEditor({...card,id:Date.now().toString(36)});
  }catch(e){alert('导入失败：'+e.message);}
  this.value='';
};

loadCompanions();
</script>
</body>
</html>
