<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>编辑伴侣</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#f5f2ee;height:100vh;display:flex;flex-direction:column;user-select:none}
.header{background:#d46a78;color:#fff;padding:10px 14px;font-size:14px;font-weight:600;-webkit-app-region:drag;user-select:none}
.content{flex:1;overflow-y:auto;padding:12px}
.section{margin-bottom:12px}
.section h3{font-size:13px;color:#8b4a56;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e8d4d8}
label{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;font-size:12px;color:#555}
label input,label textarea{padding:6px 8px;border:1px solid#d0ccc6;border-radius:6px;font-size:12px;outline:none}
label input:focus,label textarea:focus{border-color:#d46a78}
label textarea{resize:vertical;min-height:32px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>label{flex:1;min-width:120px}
.slider-row{display:flex;flex-direction:column;gap:2px;margin-bottom:3px}
.slider-row>span{display:flex;justify-content:space-between;font-size:11px}
.slider-row small{color:#d46a78;font-weight:600}
.slider-wrap{display:flex;align-items:center;gap:4px}
.slider-wrap input[type=range]{flex:1}
.footer{padding:10px 14px;border-top:1px solid#e0dcd6;display:flex;justify-content:flex-end;gap:8px;background:#fff}
.footer button{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.btn-save{background:#d46a78;color:#fff}
.btn-cancel{background:#e0dcd6;color:#333}
.mem-item{display:flex;gap:8px;align-items:center;margin-bottom:4px;padding:6px;background:#fff;border-radius:6px}
.mem-item input{flex:1}
.mem-item button{background:#c44;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px}
.btn-sm{font-size:11px;padding:4px 10px;border:none;border-radius:4px;cursor:pointer;background:#d46a78;color:#fff}
</style>
</head>
<body>
<div class="header"><span>♥ 编辑伴侣</span></div>
<div id="errorBar" style="display:none;background:#fdd;color:#a00;padding:8px 14px;font-size:12px;border-bottom:1px solid#faa"></div>
<div class="content">
  <div class="section">
    <h3>基本信息</h3>
    <div class="row"><label>名字<input id="name"></label><label>原型<input id="archetype" placeholder="温柔人妻型"></label></div>
    <label>性格核心<textarea id="core" rows="2" placeholder="温柔、细腻、会主动关心人..."></textarea></label>
    <label>说话风格<textarea id="speaking" rows="2" placeholder="说话温柔，常用'呢'、'嘛'结尾..."></textarea></label>
    <label>外观描述<textarea id="appearance" rows="2" placeholder="栗色长发，针织衫+长裙..."></textarea></label>
    <div class="row"><label>癖好<textarea id="quirks" rows="2"></textarea></label><label>恐惧<textarea id="fears" rows="2"></textarea></label></div>
  </div>

  <div class="section">
    <h3>人格维度</h3>
    <div id="sliders"></div>
  </div>

  <div class="section">
    <h3>情感锚点</h3>
    <div class="row"><label>开心的事<textarea id="happy" rows="2"></textarea></label><label>难过的事<textarea id="sad" rows="2"></textarea></label></div>
    <div class="row"><label>吃醋的事<textarea id="jealous" rows="2"></textarea></label><label>害羞的事<textarea id="shy" rows="2"></textarea></label></div>
  </div>

  <div class="section">
    <h3>恋爱与私密</h3>
    <label>恋爱风格<textarea id="romance" rows="2"></textarea></label>
    <label>爱的语言<textarea id="loveLang" rows="2" placeholder="服务行为、质量时间、身体接触..."></textarea></label>
    <label>理想约会<textarea id="idealDate" rows="2"></textarea></label>
    <div class="row"><label>性欲水平<input id="libidoLevel"></label></div>
    <div class="row"><label>兴奋点<textarea id="turnOns" rows="2"></textarea></label><label>雷区<textarea id="turnOffs" rows="2"></textarea></label></div>
    <div class="row"><label>喜欢的姿势<textarea id="positions" rows="2"></textarea></label><label>秘密幻想<textarea id="fantasies" rows="2"></textarea></label></div>
    <label>事后温存<textarea id="afterIntimacy" rows="2"></textarea></label>
    <label>底线<textarea id="boundaries" rows="2"></textarea></label>
  </div>

  <div class="section">
    <h3>记忆词条</h3>
    <div id="memories"></div>
    <button class="btn-sm" id="addMem">+ 添加词条</button>
  </div>

  <div class="section">
    <h3>桌面形象</h3>
    <label>配色 JSON<textarea id="palette" rows="3" placeholder='{"dress":"#7eb8a6","accent":"#e8c86e"}'></textarea></label>
    <label>精灵图配置 JSON<textarea id="sprite" rows="3" placeholder='{"file":"spritesheet.png","columns":10,"rows":3,"cellWidth":192,"cellHeight":192}'></textarea></label>
  </div>
</div>
<div class="footer">
  <button class="btn-cancel" id="cancelBtn">取消</button>
  <button class="btn-save" id="saveBtn">保存</button>
</div>
<script>
const api=window.electronAPI,$=id=>document.getElementById(id);
const dims=['extraversion','sensitivity','clinginess','energy','expressiveness','sophistication','sapiosexuality','tolerance','romanticism','equanimity','attachment','possessiveness','libido','dominance','demandingness','maternity'];
const dimLabels={extraversion:'外向性',sensitivity:'敏感度',clinginess:'粘人性',energy:'活力值',expressiveness:'表达风格',sophistication:'世故度',sapiosexuality:'智性恋',tolerance:'包容度',romanticism:'浪漫vs务实',equanimity:'豁达vs焦虑',attachment:'依恋型',possessiveness:'占有欲',libido:'情欲',dominance:'支配欲',demandingness:'索取度',maternity:'母性'};
const dimLows={extraversion:'安静',sensitivity:'顿感',clinginess:'独立',energy:'慵懒',expressiveness:'直接',sophistication:'天真',sapiosexuality:'颜值优先',tolerance:'挑剔',romanticism:'浪漫',equanimity:'豁达',attachment:'安全',possessiveness:'佛系',libido:'纯治愈',dominance:'顺从',demandingness:'不提要求',maternity:'讨厌照顾'};
const dimHighs={extraversion:'主动',sensitivity:'敏感',clinginess:'粘人',energy:'精力旺盛',expressiveness:'含蓄',sophistication:'洞察',sapiosexuality:'才华控',tolerance:'包容',romanticism:'务实',equanimity:'焦虑',attachment:'焦虑型',possessiveness:'占有欲强',libido:'欲望强',dominance:'掌控',demandingness:'高需求',maternity:'照料狂'};

let traits={}; dims.forEach(d=>traits[d]=50);
let memories=[], editingId=null;

const L=v=>String(v||'').split('\n').map(s=>s.trim()).filter(Boolean);

function buildSliders(){
  $('sliders').innerHTML=dims.map(d=>`
    <div class="slider-row"><span>${dimLabels[d]} <small>${traits[d]}</small></span>
    <div class="slider-wrap"><span style="font-size:10px;color:#aaa;width:28px;text-align:right">${dimLows[d]}</span>
    <input type="range" min="0" max="100" value="${traits[d]}" data-dim="${d}">
    <span style="font-size:10px;color:#aaa;width:28px">${dimHighs[d]}</span></div></div>
  `).join('');
  document.querySelectorAll('#sliders input').forEach(s=>{s.oninput=()=>{traits[s.dataset.dim]=parseInt(s.value);s.parentElement.parentElement.querySelector('small').textContent=s.value;};});
}

function renderMemories(){
  $('memories').innerHTML=memories.map((m,i)=>`<div class="mem-item">
    <input value="${m.keys.join(',')}" data-idx="${i}" class="memKeys" placeholder="关键词，逗号分隔">
    <input value="${m.content}" data-idx="${i}" class="memContent" placeholder="内容" style="flex:2">
    <button data-idx="${i}" class="delMem">×</button>
  </div>`).join('');
  document.querySelectorAll('.memKeys,.memContent').forEach(el=>{el.onchange=function(){const i=parseInt(this.dataset.idx);memories[i].keys=this.parentElement.querySelector('.memKeys').value.split(',').map(s=>s.trim()).filter(Boolean);memories[i].content=this.parentElement.querySelector('.memContent').value;};});
  document.querySelectorAll('.delMem').forEach(b=>{b.onclick=function(){const i=parseInt(this.dataset.idx);memories.splice(i,1);renderMemories();};});
}
$('addMem').onclick=()=>{memories.push({keys:[],content:''});renderMemories();};

// 接收伴侣数据（main process 发送）
api.onCompanionData?.((data)=>{
  if(!data){console.log('no companion data received');return;}
  const c=data||{};
  editingId=c.id||Date.now().toString(36);
  $('#name').value=c.name||'';
  $('#archetype').value=c.archetype||c.personality?.archetype||'';
  $('#core').value=c.personality?.core||'';
  $('#speaking').value=c.personality?.speaking_style||'';
  $('#appearance').value=c.appearance?.style||'';
  $('#quirks').value=(c.personality?.quirks||c.quirks||[]).join('\n');
  $('#fears').value=(c.personality?.fears||c.fears||[]).join('\n');
  $('#happy').value=(c.emotional_anchors?.makes_happy||[]).join('\n');
  $('#sad').value=(c.emotional_anchors?.makes_sad||[]).join('\n');
  $('#jealous').value=(c.emotional_anchors?.makes_jealous||[]).join('\n');
  $('#shy').value=(c.emotional_anchors?.makes_shy||[]).join('\n');
  $('#romance').value=c.intimacy?.romance_style||'';
  $('#loveLang').value=(c.intimacy?.love_language||[]).join('\n');
  $('#idealDate').value=c.intimacy?.dating?.ideal_date||'';
  $('#libidoLevel').value=c.intimacy?.intimate_life?.libido_level||'';
  $('#turnOns').value=(c.intimacy?.intimate_life?.turn_ons||[]).join('\n');
  $('#turnOffs').value=(c.intimacy?.intimate_life?.turn_offs||[]).join('\n');
  $('#positions').value=(c.intimacy?.intimate_life?.favorite_positions||[]).join('\n');
  $('#fantasies').value=(c.intimacy?.intimate_life?.secret_fantasies||[]).join('\n');
  $('#afterIntimacy').value=c.intimacy?.intimate_life?.after_intimacy||'';
  $('#boundaries').value=(c.intimacy?.intimate_life?.boundaries||[]).join('\n');
  $('#palette').value=JSON.stringify(c.palette||{});
  $('#sprite').value=c.spritesheet?JSON.stringify(c.spritesheet):'';
  if(c.personality?.traits)Object.assign(traits,c.personality.traits);
  memories=(c._memories||c.character_book||c.memories||[]).map(m=>typeof m==='string'?{keys:[],content:m}:{keys:m.keys||[],content:m.content||''});
  buildSliders();renderMemories();
});

function showError(msg){const e=$('#errorBar');e.textContent=msg;e.style.display=msg?'block':'none';}
$('#saveBtn').onclick=()=>{
  showError('');
  const name=$('#name').value.trim();
  if(!name){showError('请填写伴侣名字');$('#name').focus();return;}
  let palette={},spritesheet=null;
  try{palette=JSON.parse($('#palette').value||'{}');}catch(e){showError('配色 JSON 格式错误：'+e.message);return;}
  try{spritesheet=JSON.parse($('#sprite').value||'null');}catch(e){showError('精灵图配置 JSON 格式错误：'+e.message);return;}
  const data={
    id:editingId||Date.now().toString(36),
    name,
    archetype:$('#archetype').value.trim(),
    personality:{
      core:$('#core').value.trim(),
      speaking_style:$('#speaking').value.trim(),
      quirks:L($('#quirks').value),
      fears:L($('#fears').value),
      traits:{...traits},
    },
    emotional_anchors:{
      makes_happy:L($('#happy').value),
      makes_sad:L($('#sad').value),
      makes_jealous:L($('#jealous').value),
      makes_shy:L($('#shy').value),
    },
    intimacy:{
      romance_style:$('#romance').value.trim(),
      love_language:L($('#loveLang').value),
      dating:{ideal_date:$('#idealDate').value.trim()},
      intimate_life:{
        libido_level:$('#libidoLevel').value.trim(),
        turn_ons:L($('#turnOns').value),
        turn_offs:L($('#turnOffs').value),
        favorite_positions:L($('#positions').value),
        secret_fantasies:L($('#fantasies').value),
        after_intimacy:$('#afterIntimacy').value.trim(),
        boundaries:L($('#boundaries').value),
      },
    },
    appearance:{style:$('#appearance').value.trim()},
    palette,spritesheet,
    _memories:memories.filter(m=>m.content),
  };
  console.log('Saving companion:',data.name,data.id);
  api.send('companion-editor-save',data);
};
$('#cancelBtn').onclick=()=>{console.log('Cancel editor');api.send('companion-editor-cancel');};
buildSliders();
// 通知主进程编辑器已就绪
api.send('companion-editor-ready');
</script>
</body>
</html>
